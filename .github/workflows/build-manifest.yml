name: Build content manifest

# Runs whenever a content markdown file changes. Regenerates
# content/manifest.json from the *.md files and commits it back, so you
# only ever need to add the .md file — no manual manifest edits.

on:
  push:
    branches: [main]
    paths:
      - "content/*.md"
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping runs racing to push the manifest.
concurrency:
  group: build-manifest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate manifest
        run: python3 scripts/build_manifest.py

      - name: Commit manifest if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content/manifest.json; then
            echo "manifest.json already up to date."
          else
            git add content/manifest.json
            git commit -m "chore: rebuild content manifest [skip ci]"
            git push
          fi
