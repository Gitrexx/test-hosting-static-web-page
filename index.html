<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Content</title>
  <link rel="stylesheet" href="assets/style.css" />
  <!-- Lightweight Markdown renderer (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>
  <header class="site-header">
    <h1>📅 Daily Content</h1>
    <p class="subtitle">A new entry is published every day.</p>
  </header>

  <main class="layout">
    <nav id="tabs" class="tabs" aria-label="Dates">
      <!-- date tabs injected by app.js -->
    </nav>

    <article id="content" class="content">
      <p class="loading">Loading…</p>
    </article>
  </main>

  <footer class="site-footer">
    <span id="footer-note"></span>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
